# LLM provider registry (strictly validated).
# This file provides project-specific defaults and guardrails.

providers:
  mistral:
    requires_api_key: true
    connection:
      api_key_env: MISTRAL_API_KEY
    tokenizer: "mistralai/Mistral-7B-Instruct-v0.2"
    content_ratio: 0.8
    merge_threshold: 0.90
    rate_limit_rpm: 5000
    supports_batching: true
    generation_defaults:
      temperature: 0.1
    reliability_defaults:
      timeout_s: 300
      max_retries: 2

  openai:
    requires_api_key: true
    connection:
      api_key_env: OPENAI_API_KEY
    tokenizer: "tiktoken"
    content_ratio: 0.8
    merge_threshold: 0.90
    rate_limit_rpm: 10000
    supports_batching: true
    generation_defaults:
      temperature: 0.1
    reliability_defaults:
      timeout_s: 300
      max_retries: 2

  gemini:
    requires_api_key: true
    connection:
      api_key_env: GEMINI_API_KEY
    tokenizer: "sentence-transformers/all-MiniLM-L6-v2"
    content_ratio: 0.8
    merge_threshold: 0.90
    rate_limit_rpm: 15000
    supports_batching: true
    generation_defaults:
      temperature: 0.1
    reliability_defaults:
      timeout_s: 300
      max_retries: 2

  watsonx:
    requires_api_key: true
    requires_project_id: true
    connection:
      api_key_env: WATSONX_API_KEY
      project_id_env: WATSONX_PROJECT_ID
      base_url: "https://us-south.ml.cloud.ibm.com"
      base_url_env: WATSONX_URL
    tokenizer: "ibm-granite/granite-embedding-278m-multilingual"
    content_ratio: 0.75
    merge_threshold: 0.90
    rate_limit_rpm: 3000
    supports_batching: true
    generation_defaults:
      temperature: 0.1
      decoding_method: "greedy"
      repetition_penalty: 1.0
      min_tokens: 1
    reliability_defaults:
      timeout_s: 600
      max_retries: 2

  vllm:
    requires_api_key: false
    connection:
      base_url: "http://localhost:8000/v1"
      base_url_env: VLLM_BASE_URL
      api_key: "EMPTY"
    tokenizer: "sentence-transformers/all-MiniLM-L6-v2"
    content_ratio: 0.8
    merge_threshold: 0.75
    rate_limit_rpm: null
    supports_batching: true
    generation_defaults:
      temperature: 0.1
    reliability_defaults:
      timeout_s: 600
      max_retries: 2

  ollama:
    requires_api_key: false
    connection:
      base_url: "http://localhost:11434"
      base_url_env: OLLAMA_BASE_URL
    tokenizer: "sentence-transformers/all-MiniLM-L6-v2"
    content_ratio: 0.8
    merge_threshold: 0.75
    rate_limit_rpm: null
    supports_batching: true
    generation_defaults:
      temperature: 0.1
    reliability_defaults:
      timeout_s: 300
      max_retries: 2

